<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pitch Shifter</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      max-width: 28rem;
      margin: 3rem auto;
      padding: 1rem;
      text-align: center;
    }
    h1 { font-size: 1.3rem; margin: 0 0 2rem; font-weight: 500; letter-spacing: 0.02em; }
    .readout {
      font-size: 3.5rem;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      line-height: 1;
      margin: 0;
    }
    .unit { display: block; font-size: 0.8rem; color: #888; letter-spacing: 0.1em; text-transform: uppercase; margin-top: 0.4rem; }
    .controls {
      display: flex;
      justify-content: center;
      align-items: stretch;
      gap: 0.75rem;
      margin: 2.5rem 0;
    }
    button {
      font: inherit;
      font-size: 1.1rem;
      padding: 0.9rem 1.25rem;
      border: 1px solid currentColor;
      background: transparent;
      color: inherit;
      border-radius: 0.6rem;
      cursor: pointer;
      min-width: 5rem;
      transition: background 0.1s;
    }
    button:disabled { opacity: 0.3; cursor: not-allowed; }
    button:not(:disabled):hover { background: rgba(127,127,127,0.15); }
    button:not(:disabled):active { background: rgba(127,127,127,0.3); }
    .symbol { font-size: 1.8rem; line-height: 1; }
    .conn {
      display: inline-block;
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 50%;
      margin-right: 0.5rem;
      vertical-align: middle;
      background: #888;
    }
    .conn.up { background: #4caf50; }
    .conn.down { background: #c33; }
    #status {
      margin-top: 1.5rem;
      color: #888;
      font-size: 0.8rem;
      min-height: 1.2em;
    }
  </style>
</head>
<body>
  <h1>Pitch Shifter</h1>

  <div>
    <div id="value" class="readout">0</div>
    <span class="unit">semitones</span>
  </div>

  <div class="controls">
    <button id="flat" title="Lower pitch by 1 semitone" aria-label="Flat"><span class="symbol">&#9837;</span></button>
    <button id="reset" title="Reset to 0">Reset</button>
    <button id="sharp" title="Raise pitch by 1 semitone" aria-label="Sharp"><span class="symbol">&#9839;</span></button>
  </div>

  <div id="status"><span id="conn" class="conn"></span><span id="conn-text">connecting…</span></div>

  <script src="app.js"></script>
</body>
</html>
